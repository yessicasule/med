events {}

http {
  server {
    listen 80;

    location / {
      proxy_pass http://frontend:4173;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      proxy_pass http://backend:3000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /metrics {
      proxy_pass http://backend:3000/metrics;
    }
  }
}
